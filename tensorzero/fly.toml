# Fly.io app config for TensorZero Gateway.
# Deploy from this directory: cd tensorzero && fly deploy
# First-time setup: fly launch --no-deploy (to create the app), then fly deploy.

app = "anesthesia-playground-tz"
primary_region = "iad"

[build]
  # Uses the Dockerfile in this directory

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # keep always-on — free tier supports 1 machine 24/7
  min_machines_running = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3000
    timeout = "5s"
    type = "http"

[[vm]]
  size = "shared-cpu-1x"   # 256 MB RAM — TensorZero Rust binary is very lightweight
  memory = "256mb"
